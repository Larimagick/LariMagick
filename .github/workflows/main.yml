name: Gerar Cobrinha

on:
  schedule:
    # Roda todo dia meia noite
    - cron: "0 0 * * *"
  workflow_dispatch: # Permite rodar manualmente a qualquer hora

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Gerar o arquivo SVG da cobrinha
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: LariMagick
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Enviar a cobrinha para a branch 'output'
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
